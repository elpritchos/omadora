# Laptop multimedia keys for volume and LCD brightness (with OSD)
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, omactl audio output volume raise
bindeld = ,XF86AudioLowerVolume, Volume down, exec, omactl audio output volume lower
bindeld = ,XF86AudioMute, Mute, exec, omactl audio output volume mute-toggle
bindeld = ,XF86AudioMicMute, Mute microphone, exec, omactl audio input mute
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, omactl display brightness +5%
bindeld = ,XF86MonBrightnessDown, Brightness down, exec, omactl display brightness 5%-
bindeld = SHIFT, XF86MonBrightnessUp, Brightness maximum, exec, omactl display brightness 100%
bindeld = SHIFT, XF86MonBrightnessDown, Brightness minimum, exec, omactl display brightness 1%
bindeld = ,XF86KbdBrightnessUp, Keyboard brightness up, exec, omactl keyboard brightness up
bindeld = ,XF86KbdBrightnessDown, Keyboard brightness down, exec, omactl keyboard brightness down
bindld = ,XF86KbdLightOnOff, Keyboard backlight cycle, exec, omactl keyboard brightness cycle
bindld = ,XF86TouchpadToggle, Toggle touchpad, exec, omactl toggle touchpad
bindld = ,XF86TouchpadOn, Enable touchpad, exec, omactl toggle touchpad on
bindld = ,XF86TouchpadOff, Disable touchpad, exec, omactl toggle touchpad off

# Requires playerctl
bindld = , XF86AudioPlay, Play, exec, playerctl play-pause
bindld = , XF86AudioPause, Pause, exec, playerctl pause
bindld = , XF86AudioNext, Next, exec, playerctl next
bindld = , XF86AudioPrev, Previous, exec, playerctl previous

# Switch audio output with Super + Mute
bindld = SUPER, XF86AudioMute, Switch audio output, exec, omactl audio output switch
