# Laptop multimedia keys for volume and LCD brightness (with OSD)
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, omadora-audio-output-volume raise
bindeld = ,XF86AudioLowerVolume, Volume down, exec, omadora-audio-output-volume lower
bindeld = ,XF86AudioMute, Mute, exec, omadora-audio-output-volume mute-toggle
bindeld = ,XF86AudioMicMute, Mute microphone, exec, omadora-audio-input-mute
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, omadora-brightness-display +5%
bindeld = ,XF86MonBrightnessDown, Brightness down, exec, omadora-brightness-display 5%-
bindeld = SHIFT, XF86MonBrightnessUp, Brightness maximum, exec, omadora-brightness-display 100%
bindeld = SHIFT, XF86MonBrightnessDown, Brightness minimum, exec, omadora-brightness-display 1%
bindeld = ,XF86KbdBrightnessUp, Keyboard brightness up, exec, omadora-brightness-keyboard up
bindeld = ,XF86KbdBrightnessDown, Keyboard brightness down, exec, omadora-brightness-keyboard down
bindld = ,XF86KbdLightOnOff, Keyboard backlight cycle, exec, omadora-brightness-keyboard cycle
bindld = ,XF86TouchpadToggle, Toggle touchpad, exec, omadora-toggle-touchpad
bindld = ,XF86TouchpadOn, Enable touchpad, exec, omadora-toggle-touchpad on
bindld = ,XF86TouchpadOff, Disable touchpad, exec, omadora-toggle-touchpad off

# Requires playerctl
bindld = , XF86AudioPlay, Play, exec, playerctl play-pause
bindld = , XF86AudioPause, Pause, exec, playerctl pause
bindld = , XF86AudioNext, Next, exec, playerctl next
bindld = , XF86AudioPrev, Previous, exec, playerctl previous

# Switch audio output with Super + Mute
bindld = SUPER, XF86AudioMute, Switch audio output, exec, omadora-audio-output-switch
