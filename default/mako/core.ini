layer=overlay
group-by=app-name,summary,body
width=420
height=500
outer-margin=20
padding=10,15
border-size=1
max-icon-size=32
default-timeout=8000
font=Adwaita Sans 10, JetBrainsMono Nerd Font 10

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false

[urgency=critical]
default-timeout=0

[summary~="Welcome to Omadora"]
on-button-left=exec sh -c 'omadora-notification-dismiss "Welcome to Omadora"; omadora-menu-keybindings'
