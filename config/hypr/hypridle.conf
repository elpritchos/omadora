general {
    lock_cmd = systemctl --user start omadora-hyprlock.service
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_wayland_inhibit = true # Prevents screensaver resetting idle state
}

