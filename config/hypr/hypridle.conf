# 2.5m Screensaver
listener {
    timeout = 150
    on-timeout = systemctl --user start omadora-screensaver.service
}

# 5m Lock
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# 5.5m Screen off
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && brightnessctl -r
}

# 30m Suspend
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
